<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitty Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="favicon.png">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream:     #fdf6f0;
  --blush:     #f7c5d5;
  --rose:      #e8799a;
  --hot:       #d44f78;
  --deep:      #a83258;
  --soft-grey: #f2eae8;
  --mid-grey:  #c9b8ba;
  --text:      #3d1f2b;
  --shadow-color: 320deg 40% 60;%
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--cream);
  font-family: 'Nunito', sans-serif;
  overflow: hidden;
}

/* ── Noise texture overlay ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* ── Ambient blobs ── */
.blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
}
.blob-1 { width: 420px; height: 420px; background: #f7c5d540; top: -100px; left: -100px; animation: drift1 12s ease-in-out infinite; }
.blob-2 { width: 320px; height: 320px; background: #e8799a30; bottom: -80px; right: -60px; animation: drift2 9s ease-in-out infinite; }
.blob-3 { width: 200px; height: 200px; background: #fddde625; bottom: 30%; left: 10%; animation: drift3 15s ease-in-out infinite; }

@keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,20px)} }
@keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,-30px)} }
@keyframes drift3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(15px,-15px)} }

/* ── Card ── */
.card {
  position: relative;
  z-index: 1;
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(24px) saturate(160%);
  -webkit-backdrop-filter: blur(24px) saturate(160%);
  border: 1.5px solid rgba(255,255,255,0.9);
  border-radius: 40px;
  padding: 36px 32px 32px;
  width: 360px;
  box-shadow:
    0 2px 0px rgba(255,255,255,0.9) inset,
    0 -1px 0 rgba(0,0,0,0.04) inset,
    0 8px 24px -4px rgba(168,50,88,0.12),
    0 32px 64px -12px rgba(168,50,88,0.18),
    0 64px 96px -24px rgba(168,50,88,0.10);
  animation: floatIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes floatIn {
  from { opacity:0; transform: translateY(32px) scale(0.95); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

/* ── Kitty face ── */
.kitty {
  position: absolute;
  top: -68px;
  left: 50%;
  transform: translateX(-50%);
  width: 100px;
  height: 80px;
}

.kitty-face {
  width: 86px;
  height: 72px;
  background: white;
  border-radius: 50% 50% 46% 46%;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  bottom: 0;
  border: 2px solid #f0dde4;
  box-shadow: 0 4px 16px rgba(168,50,88,0.15);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  padding-top: 18px;
}

/* ears */
.ear {
  position: absolute;
  width: 28px;
  height: 32px;
  background: white;
  border: 2px solid #f0dde4;
  top: -10px;
}
.ear.left  { left: -2px; border-radius: 50% 50% 0 50%; transform: rotate(-8deg); }
.ear.right { right: -2px; border-radius: 50% 0 50% 50%; transform: rotate(8deg); }
.ear-inner {
  position: absolute;
  width: 14px; height: 18px;
  background: #fbc8d8;
  border-radius: inherit;
  top: 4px; left: 50%; transform: translateX(-50%);
}

/* face details */
.face-details {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.eyes {
  display: flex; gap: 14px;
}
.eye {
  width: 8px; height: 8px;
  background: #3d1f2b;
  border-radius: 50%;
  position: relative;
  animation: blink 5s infinite;
}
.eye::after {
  content:'';
  position: absolute;
  width: 3px; height: 3px;
  background: white;
  border-radius: 50%;
  top: 1px; left: 1px;
}
@keyframes blink {
  0%,94%,98%,100%{transform:scaleY(1)}
  96%{transform:scaleY(0.1)}
}
.nose {
  width: 8px; height: 5px;
  background: #e8799a;
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  margin-top: 2px;
}
.whiskers {
  display: flex; gap: 10px; align-items: center; margin-top: 2px;
}
.w { width: 18px; height: 1.5px; background: #c9b8ba; border-radius: 2px; }

/* bow */
.bow-wrap {
  position: absolute;
  top: -4px;
  right: -8px;
}
.bow {
  width: 28px; height: 22px;
  position: relative;
  animation: bowWiggle 2.5s ease-in-out infinite;
  transform-origin: center;
}
@keyframes bowWiggle {
  0%,100%{transform:rotate(-5deg) scale(1)}
  50%{transform:rotate(5deg) scale(1.05)}
}
.bow-side {
  position: absolute;
  width: 12px; height: 10px;
  background: var(--hot);
  border-radius: 50%;
  top: 50%; transform: translateY(-50%);
  box-shadow: 0 2px 6px rgba(212,79,120,0.4);
}
.bow-side.left  { left: 0; transform: translateY(-50%) rotate(20deg); }
.bow-side.right { right: 0; transform: translateY(-50%) rotate(-20deg); }
.bow-knot {
  position: absolute;
  width: 7px; height: 7px;
  background: var(--deep);
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
}

/* ── Header ── */
.header {
  margin-top: 20px;
  margin-bottom: 20px;
  text-align: center;
}
.header h1 {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--rose);
  opacity: 0.8;
}

/* ── Display ── */
.display-wrap {
  background: var(--soft-grey);
  border-radius: 20px;
  padding: 16px 20px 14px;
  margin-bottom: 20px;
  border: 1.5px solid rgba(200,170,180,0.35);
  box-shadow: inset 0 2px 8px rgba(168,50,88,0.06), inset 0 -1px 0 rgba(255,255,255,0.8);
  position: relative;
}
.display-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--mid-grey);
  margin-bottom: 6px;
}
.display-history {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--mid-grey);
  height: 16px;
  text-align: right;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#display {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  font-family: 'DM Mono', monospace;
  font-size: 36px;
  font-weight: 400;
  color: var(--text);
  text-align: right;
  caret-color: var(--hot);
  letter-spacing: -1px;
}
#display::placeholder { color: var(--mid-grey); }
.display-cursor {
  position: absolute;
  bottom: 14px;
  right: 20px;
  width: 2px;
  height: 36px;
  background: var(--hot);
  border-radius: 2px;
  animation: cursor-blink 1.2s step-end infinite;
  pointer-events: none;
  opacity: 0;
}
@keyframes cursor-blink { 0%,100%{opacity:0} 50%{opacity:1} }

/* ── Button grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

button {
  font-family: 'Nunito', sans-serif;
  font-size: 18px;
  font-weight: 700;
  height: 68px;
  border: none;
  border-radius: 18px;
  cursor: pointer;
  transition: transform 0.1s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.1s, filter 0.1s;
  position: relative;
  overflow: hidden;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  outline: none;
}
button::before {
  content:'';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.18);
  border-radius: inherit;
  opacity: 0;
  transition: opacity 0.15s;
}
button:hover::before { opacity: 1; }
button:hover  { transform: translateY(-2px) scale(1.04); }
button:active { transform: translateY(1px) scale(0.96); }

/* ripple */
.ripple {
  position: absolute;
  border-radius: 50%;
  transform: scale(0);
  background: rgba(255,255,255,0.4);
  pointer-events: none;
  animation: rippleAnim 0.5s linear;
}
@keyframes rippleAnim {
  to { transform: scale(4); opacity: 0; }
}

/* button types */
.btn-num {
  background: white;
  color: var(--text);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.9) inset,
    0 4px 12px rgba(168,50,88,0.08),
    0 1px 3px rgba(168,50,88,0.12);
}
.btn-num:hover { box-shadow: 0 1px 0 rgba(255,255,255,0.9) inset, 0 8px 20px rgba(168,50,88,0.14), 0 2px 6px rgba(168,50,88,0.16); }

.btn-op {
  background: var(--blush);
  color: var(--deep);
  box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 4px 12px rgba(168,50,88,0.12);
}
.btn-op:hover { box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 8px 20px rgba(168,50,88,0.2); }

.btn-clear {
  background: #ffe0ea;
  color: var(--deep);
  font-size: 14px;
  letter-spacing: 1px;
  box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 4px 12px rgba(168,50,88,0.1);
}

.btn-del {
  background: #ffe0ea;
  color: var(--rose);
  box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 4px 12px rgba(168,50,88,0.1);
}

.btn-eq {
  background: linear-gradient(145deg, var(--rose), var(--hot));
  color: white;
  font-size: 24px;
  box-shadow:
    0 1px 0 rgba(255,255,255,0.25) inset,
    0 6px 16px rgba(212,79,120,0.35),
    0 2px 4px rgba(212,79,120,0.3);
}
.btn-eq:hover {
  box-shadow: 0 1px 0 rgba(255,255,255,0.25) inset, 0 12px 28px rgba(212,79,120,0.45), 0 4px 8px rgba(212,79,120,0.35);
  filter: brightness(1.06);
}

.btn-pct {
  background: var(--blush);
  color: var(--deep);
  box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 4px 12px rgba(168,50,88,0.12);
}

/* span-2 for zero */
.span2 { grid-column: span 2; border-radius: 22px; }

/* ── Footer ── */
.footer {
  margin-top: 18px;
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--mid-grey);
}
.paw { display: inline-block; animation: pawBounce 2s ease-in-out infinite; }
@keyframes pawBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }

/* ── Error shake ── */
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}
.shake { animation: shake 0.4s cubic-bezier(0.36,0.07,0.19,0.97); }

/* ── Result pop ── */
@keyframes resultPop {
  0%{transform:scale(1)}
  40%{transform:scale(1.06)}
  100%{transform:scale(1)}
}
.result-pop { animation: resultPop 0.3s cubic-bezier(0.34,1.56,0.64,1); }

</style>
</head>
<body>

<!-- Ambient blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="card">

  <!-- Kitty face -->
  <div class="kitty">
    <div class="ear left"><div class="ear-inner"></div></div>
    <div class="ear right"><div class="ear-inner"></div></div>
    <div class="kitty-face">
      <div class="face-details">
        <div class="eyes">
          <div class="eye"></div>
          <div class="eye"></div>
        </div>
        <div class="nose"></div>
        <div class="whiskers">
          <div class="w"></div><div class="w" style="width:10px"></div>
          <div class="w" style="width:10px"></div><div class="w"></div>
        </div>
      </div>
    </div>
    <div class="bow-wrap">
      <div class="bow">
        <div class="bow-side left"></div>
        <div class="bow-side right"></div>
        <div class="bow-knot"></div>
      </div>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <h1>Kitty Calculator</h1>
  </div>

  <!-- Display -->
  <div class="display-wrap" id="displayWrap">
    <div class="display-label">Resultado</div>
    <div class="display-history" id="history">&nbsp;</div>
    <input id="display" type="text" readonly placeholder="0" aria-label="display">
    <div class="display-cursor" id="cursor"></div>
  </div>

  <!-- Buttons -->
  <div class="grid">
    <button class="btn-clear" onclick="limpar()">C</button>
    <button class="btn-del"   onclick="apagar()">⌫</button>
    <button class="btn-pct"   onclick="porcentagem()">%</button>
    <button class="btn-op"    onclick="add('/')">÷</button>

    <button class="btn-num"   onclick="add('7')">7</button>
    <button class="btn-num"   onclick="add('8')">8</button>
    <button class="btn-num"   onclick="add('9')">9</button>
    <button class="btn-op"    onclick="add('*')">×</button>

    <button class="btn-num"   onclick="add('4')">4</button>
    <button class="btn-num"   onclick="add('5')">5</button>
    <button class="btn-num"   onclick="add('6')">6</button>
    <button class="btn-op"    onclick="add('-')">−</button>

    <button class="btn-num"   onclick="add('1')">1</button>
    <button class="btn-num"   onclick="add('2')">2</button>
    <button class="btn-num"   onclick="add('3')">3</button>
    <button class="btn-op"    onclick="add('+')">+</button>

    <button class="btn-num span2" onclick="add('0')">0</button>
    <button class="btn-num"   onclick="add('.')">.</button>
    <button class="btn-eq"    onclick="calcular()">=</button>
  </div>

  <div class="footer">
    <span class="paw">🐾</span> made with love <span class="paw" style="animation-delay:.4s">🐾</span>
  </div>

</div>

<script>
const display  = document.getElementById('display');
const history  = document.getElementById('history');
const cursor   = document.getElementById('cursor');
const dWrap    = document.getElementById('displayWrap');

let expr        = '';
let justCalc    = false;

/* ── Core logic ── */
function updateDisplay(val) {
  display.value = val || '';
  display.placeholder = '0';
  // cursor blinking only when active
  cursor.style.opacity = val ? '1' : '0';
}

function add(val) {
  // after a result, operator continues, digit restarts
  if (justCalc) {
    const ops = ['+','-','*','/'];
    if (!ops.includes(val)) {
      expr = '';
      history.textContent = '\u00a0';
    }
    justCalc = false;
  }
  expr += val;
  updateDisplay(formatDisplay(expr));
  rippleBtn(event);
  clickSound();
}

function limpar() {
  expr = '';
  justCalc = false;
  updateDisplay('');
  history.textContent = '\u00a0';
  cursor.style.opacity = '0';
  rippleBtn(event);
}

function apagar() {
  expr = expr.slice(0, -1);
  updateDisplay(formatDisplay(expr));
  rippleBtn(event);
}

function porcentagem() {
  if (!expr) return;
  try {
    const v = eval(expr) / 100;
    history.textContent = expr + ' %';
    expr = String(v);
    updateDisplay(formatDisplay(expr));
    animatePop();
  } catch(e) { erro(); }
}

function calcular() {
  if (!expr) return;
  try {
    const raw = eval(expr);
    // avoid floating point weirdness
    const result = parseFloat(raw.toPrecision(12));
    history.textContent = formatDisplay(expr) + ' =';
    expr = String(result);
    updateDisplay(formatDisplay(expr));
    justCalc = true;
    animatePop();
  } catch(e) { erro(); }
  rippleBtn(event);
}

function erro() {
  display.value = 'Erro 😿';
  expr = '';
  dWrap.classList.add('shake');
  dWrap.addEventListener('animationend', () => dWrap.classList.remove('shake'), {once:true});
}

/* ── Formatting ── */
function formatDisplay(str) {
  // Show × ÷ instead of * /
  return str.replace(/\*/g,'×').replace(/\//g,'÷');
}

/* ── Animations ── */
function animatePop() {
  display.classList.add('result-pop');
  display.addEventListener('animationend', () => display.classList.remove('result-pop'), {once:true});
}

function rippleBtn(e) {
  if (!e || !e.currentTarget) return;
  const btn = e.currentTarget;
  const r = document.createElement('span');
  r.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  r.style.cssText = `width:${size}px;height:${size}px;left:${(rect.width-size)/2}px;top:${(rect.height-size)/2}px`;
  btn.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}

// Attach ripple via event delegation
document.querySelector('.grid').addEventListener('click', function(e) {
  const btn = e.target.closest('button');
  if (!btn) return;
  rippleInner(btn, e);
});

function rippleInner(btn, e) {
  const r = document.createElement('span');
  r.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const x = e.clientX - rect.left - size/2;
  const y = e.clientY - rect.top  - size/2;
  r.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
  btn.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}

/* ── Sound ── */
let audioCtx;
function clickSound(type='click') {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    if (type === 'eq') {
      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.06);
    } else if (type === 'clear') {
      osc.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
    } else {
      osc.frequency.setValueAtTime(520, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(560, audioCtx.currentTime + 0.04);
    }
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.15);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
  } catch(e) {}
}

/* ── Keyboard ── */
document.addEventListener('keydown', function(e) {
  if ('0123456789'.includes(e.key)) { add(e.key); }
  else if (['+','-'].includes(e.key))   { add(e.key); }
  else if (e.key === '*')  { add('*'); }
  else if (e.key === '/')  { e.preventDefault(); add('/'); }
  else if (e.key === '.')  { add('.'); }
  else if (e.key === '%')  { porcentagem(); }
  else if (e.key === 'Enter' || e.key === '=') { calcular(); clickSound('eq'); }
  else if (e.key === 'Backspace') { apagar(); }
  else if (e.key === 'Escape' || e.key === 'c' || e.key === 'C') { limpar(); clickSound('clear'); }
});
</script>
</body>
</html>
