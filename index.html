<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="light-content">
<meta name="apple-mobile-web-app-title" content="Kitty Calc">
<meta name="theme-color" content="#fdf6f0">
<title>Kitty Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kitty Calc">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream:     #fdf6f0;
  --blush:     #f7c5d5;
  --rose:      #e8799a;
  --hot:       #d44f78;
  --deep:      #a83258;
  --soft-grey: #f2eae8;
  --mid-grey:  #c9b8ba;
  --text:      #3d1f2b;
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html { height: 100%; }

body {
  min-height: 100%;
  font-family: 'Nunito', sans-serif;
  background: var(--cream);
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}

/* ── Noise texture overlay ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* ── Ambient blobs ── */
.blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
}
.blob-1 { width: 420px; height: 420px; background: #f7c5d540; top: -100px; left: -100px; animation: drift1 12s ease-in-out infinite; }
.blob-2 { width: 320px; height: 320px; background: #e8799a30; bottom: -80px; right: -60px; animation: drift2 9s ease-in-out infinite; }
.blob-3 { width: 200px; height: 200px; background: #fddde625; bottom: 30%; left: 10%; animation: drift3 15s ease-in-out infinite; }

@keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,20px)} }
@keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,-30px)} }
@keyframes drift3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(15px,-15px)} }

/* ════════════════════════════════════════
   DESKTOP (telas >= 600px)
   Card centralizado, layout original
   ════════════════════════════════════════ */
@media (min-width: 600px) {
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .card {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    border: 1.5px solid rgba(255,255,255,0.9);
    border-radius: 40px;
    padding: 36px 32px 32px;
    width: 360px;
    box-shadow:
      0 2px 0px rgba(255,255,255,0.9) inset,
      0 -1px 0 rgba(0,0,0,0.04) inset,
      0 8px 24px -4px rgba(168,50,88,0.12),
      0 32px 64px -12px rgba(168,50,88,0.18),
      0 64px 96px -24px rgba(168,50,88,0.10);
    animation: floatIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes floatIn {
    from { opacity:0; transform: translateY(32px) scale(0.95); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }

  /* kitty */
  .kitty {
    position: absolute;
    top: -68px;
    left: 50%;
    transform: translateX(-50%);
    width: 100px;
    height: 80px;
  }
  .kitty-face {
    width: 86px; height: 72px;
    background: white;
    border-radius: 50% 50% 46% 46%;
    position: absolute;
    left: 50%; transform: translateX(-50%);
    bottom: 0;
    border: 2px solid #f0dde4;
    box-shadow: 0 4px 16px rgba(168,50,88,0.15);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    padding-top: 18px;
  }
  .ear { width: 28px; height: 32px; top: -10px; }
  .ear-inner { width: 14px; height: 18px; }
  .eye { width: 8px; height: 8px; }
  .eye::after { width: 3px; height: 3px; }
  .nose { width: 8px; height: 5px; }
  .whiskers { gap: 10px; }
  .w { width: 18px; }
  .bow { width: 28px; height: 22px; }
  .bow-side { width: 12px; height: 10px; }
  .bow-knot { width: 7px; height: 7px; }
  .bow-wrap { top: -4px; right: -8px; }

  .kitty-wrap { display: none; } /* hide mobile kitty on desktop */

  /* header */
  .header { margin-top: 20px; margin-bottom: 20px; }
  .header h1 { font-size: 15px; letter-spacing: 3px; }

  /* display */
  .display-wrap {
    background: var(--soft-grey);
    border-radius: 20px;
    padding: 16px 20px 14px;
    margin-bottom: 20px;
    border: 1.5px solid rgba(200,170,180,0.35);
    box-shadow: inset 0 2px 8px rgba(168,50,88,0.06), inset 0 -1px 0 rgba(255,255,255,0.8);
  }
  .display-history { font-size: 12px; height: 16px; }
  #display { font-size: 36px; letter-spacing: -1px; pointer-events: auto; }

  /* buttons */
  .buttons-section { padding: 0; }
  button { height: 68px; border-radius: 18px; font-size: 18px; }
  .btn-clear { font-size: 14px; }
  .btn-eq { font-size: 24px; }
  .span2 { border-radius: 22px; }

  /* footer */
  .footer { margin-top: 18px; font-size: 10px; }

  /* mobile-only elements hidden on desktop */
  .app { display: contents; }
  .top-section { display: contents; }
  .display-label { display: block; }
}

/* ════════════════════════════════════════
   MOBILE (telas < 600px)
   Full-screen, layout em coluna
   ════════════════════════════════════════ */
@media (max-width: 599px) {
  html { overflow: hidden; }

  body {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
  }

  /* hide desktop-only card structure */
  .card {
    display: contents; /* card "dissolves" — children are laid out directly */
  }

  /* kitty fixed on top of card — hide on mobile (we use kitty-wrap instead) */
  .kitty { display: none; }

  .app {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 430px;
    margin: 0 auto;
    width: 100%;
  }

  .top-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 12px 20px 0;
    min-height: 0;
  }

  /* mobile kitty */
  .kitty-wrap {
    display: flex;
    justify-content: center;
    padding-top: 12px;
    padding-bottom: 8px;
    flex-shrink: 0;
  }
  .kitty-mob {
    position: relative;
    width: 90px;
    height: 72px;
  }
  .kitty-face-mob {
    width: 76px; height: 64px;
    background: white;
    border-radius: 50% 50% 46% 46%;
    position: absolute;
    left: 50%; transform: translateX(-50%);
    bottom: 0;
    border: 2px solid #f0dde4;
    box-shadow: 0 4px 16px rgba(168,50,88,0.15);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    padding-top: 14px;
  }

  /* header */
  .header { margin-bottom: 14px; flex-shrink: 0; }
  .header h1 { font-size: 11px; letter-spacing: 3px; }

  /* display */
  .display-wrap {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border-radius: 24px;
    padding: 16px 20px 14px;
    border: 1.5px solid rgba(255,255,255,0.9);
    box-shadow: inset 0 2px 8px rgba(168,50,88,0.05), 0 4px 20px rgba(168,50,88,0.08);
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    min-height: 110px;
    max-height: 150px;
  }
  .display-history { font-size: 13px; height: 18px; }
  #display {
    font-size: clamp(28px, 8vw, 42px);
    pointer-events: none;
  }

  /* buttons */
  .buttons-section { padding: 12px 16px 16px; flex-shrink: 0; }
  button { height: clamp(58px, 13vw, 72px); border-radius: 20px; font-size: clamp(16px, 5vw, 22px); touch-action: manipulation; }
  .btn-clear { font-size: clamp(12px, 3.5vw, 15px); }
  .btn-eq { font-size: clamp(20px, 6vw, 28px); }
  .span2 { border-radius: 24px; }

  /* footer */
  .footer { padding: 8px 0 4px; font-size: 9px; }

  /* landscape */
  @media (orientation: landscape) and (max-height: 500px) {
    .kitty-wrap { display: none; }
    .header { margin-bottom: 4px; }
    .top-section { padding-top: 4px; }
    .buttons-section { padding: 6px 16px 8px; }
    button { height: 46px; }
    .display-wrap { min-height: 70px; max-height: 90px; }
    #display { font-size: 26px; }
  }
}

/* ── Shared styles (all screen sizes) ── */

.header { text-align: center; }
.header h1 {
  font-weight: 800;
  text-transform: uppercase;
  color: var(--rose);
  opacity: 0.8;
}

.display-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--mid-grey);
  margin-bottom: 6px;
}
.display-history {
  font-family: 'DM Mono', monospace;
  color: var(--mid-grey);
  text-align: right;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#display {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  font-family: 'DM Mono', monospace;
  font-weight: 400;
  color: var(--text);
  text-align: right;
  caret-color: var(--hot);
  -webkit-appearance: none;
}
#display::placeholder { color: var(--mid-grey); }

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

button {
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: transform 0.1s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.1s, filter 0.1s;
  position: relative;
  overflow: hidden;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  outline: none;
  -webkit-touch-callout: none;
}
button::before {
  content:'';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.18);
  border-radius: inherit;
  opacity: 0;
  transition: opacity 0.15s;
}
button:hover::before { opacity: 1; }
button:hover  { transform: translateY(-2px) scale(1.04); }
button:active { transform: translateY(1px) scale(0.96); }

.ripple {
  position: absolute;
  border-radius: 50%;
  transform: scale(0);
  background: rgba(255,255,255,0.4);
  pointer-events: none;
  animation: rippleAnim 0.5s linear;
}
@keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

.btn-num {
  background: white;
  color: var(--text);
  box-shadow: 0 1px 0 rgba(255,255,255,0.9) inset, 0 4px 12px rgba(168,50,88,0.08), 0 1px 3px rgba(168,50,88,0.12);
}
.btn-num:hover { box-shadow: 0 1px 0 rgba(255,255,255,0.9) inset, 0 8px 20px rgba(168,50,88,0.14), 0 2px 6px rgba(168,50,88,0.16); }
.btn-op {
  background: var(--blush);
  color: var(--deep);
  box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 4px 12px rgba(168,50,88,0.12);
}
.btn-op:hover { box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 8px 20px rgba(168,50,88,0.2); }
.btn-clear {
  background: #ffe0ea;
  color: var(--deep);
  letter-spacing: 1px;
  box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 4px 12px rgba(168,50,88,0.1);
}
.btn-del {
  background: #ffe0ea;
  color: var(--rose);
  box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 4px 12px rgba(168,50,88,0.1);
}
.btn-eq {
  background: linear-gradient(145deg, var(--rose), var(--hot));
  color: white;
  box-shadow: 0 1px 0 rgba(255,255,255,0.25) inset, 0 6px 16px rgba(212,79,120,0.35), 0 2px 4px rgba(212,79,120,0.3);
}
.btn-eq:hover { box-shadow: 0 1px 0 rgba(255,255,255,0.25) inset, 0 12px 28px rgba(212,79,120,0.45), 0 4px 8px rgba(212,79,120,0.35); filter: brightness(1.06); }
.btn-pct {
  background: var(--blush);
  color: var(--deep);
  box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 4px 12px rgba(168,50,88,0.12);
}
.span2 { grid-column: span 2; }

/* shared ear/face styles */
.ear {
  position: absolute;
  background: white;
  border: 2px solid #f0dde4;
}
.ear.left  { left: -2px; border-radius: 50% 50% 0 50%; transform: rotate(-8deg); }
.ear.right { right: -2px; border-radius: 50% 0 50% 50%; transform: rotate(8deg); }
.ear-inner {
  position: absolute;
  background: #fbc8d8;
  border-radius: inherit;
  top: 4px; left: 50%; transform: translateX(-50%);
}
.face-details { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.eyes { display: flex; }
.eye {
  background: #3d1f2b;
  border-radius: 50%;
  position: relative;
  animation: blink 5s infinite;
}
.eye::after {
  content:'';
  position: absolute;
  background: white;
  border-radius: 50%;
  top: 1px; left: 1px;
}
@keyframes blink {
  0%,94%,98%,100%{transform:scaleY(1)}
  96%{transform:scaleY(0.1)}
}
.nose {
  background: #e8799a;
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  margin-top: 2px;
}
.whiskers { display: flex; align-items: center; margin-top: 2px; }
.w { height: 1.5px; background: #c9b8ba; border-radius: 2px; }
.bow-wrap { position: absolute; }
.bow {
  position: relative;
  animation: bowWiggle 2.5s ease-in-out infinite;
  transform-origin: center;
}
@keyframes bowWiggle { 0%,100%{transform:rotate(-5deg) scale(1)} 50%{transform:rotate(5deg) scale(1.05)} }
.bow-side {
  position: absolute;
  background: var(--hot);
  border-radius: 50%;
  top: 50%;
  box-shadow: 0 2px 6px rgba(212,79,120,0.4);
}
.bow-side.left  { left: 0; transform: translateY(-50%) rotate(20deg); }
.bow-side.right { right: 0; transform: translateY(-50%) rotate(-20deg); }
.bow-knot {
  position: absolute;
  background: var(--deep);
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
}

.footer {
  text-align: center;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--mid-grey);
}
.paw { display: inline-block; animation: pawBounce 2s ease-in-out infinite; }
@keyframes pawBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }

@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}
.shake { animation: shake 0.4s cubic-bezier(0.36,0.07,0.19,0.97); }

@keyframes resultPop {
  0%{transform:scale(1)} 40%{transform:scale(1.06)} 100%{transform:scale(1)}
}
.result-pop { animation: resultPop 0.3s cubic-bezier(0.34,1.56,0.64,1); }

@keyframes floatIn {
  from { opacity:0; transform: translateY(32px) scale(0.95); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

/* ── Splash screen ── */
#splash {
  position: fixed;
  inset: 0;
  z-index: 999;
  background: var(--cream);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0px;
  transition: opacity 0.6s ease, transform 0.6s ease;
}
#splash.hide {
  opacity: 0;
  transform: scale(1.04);
  pointer-events: none;
}
.splash-hearts {
  font-size: 28px;
  animation: splashHearts 1.4s ease-in-out infinite;
  margin-bottom: 8px;
}
@keyframes splashHearts {
  0%,100% { transform: scale(1);   }
  50%      { transform: scale(1.2); }
}
.splash-title {
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--mid-grey);
  margin-bottom: 18px;
}
.splash-name {
  font-family: 'Nunito', sans-serif;
  font-size: 52px;
  font-weight: 900;
  color: var(--hot);
  letter-spacing: -1px;
  animation: splashPop 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
  animation-delay: 0.2s;
  opacity: 0;
}
@keyframes splashPop {
  from { opacity:0; transform: scale(0.7) translateY(20px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}
.splash-sub {
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--rose);
  opacity: 0.8;
  margin-top: 6px;
  animation: splashPop 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
  animation-delay: 0.45s;
  letter-spacing: 1px;
}
.splash-kitty-wrap {
  margin-top: 32px;
  animation: splashPop 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
  animation-delay: 0.6s;
  opacity: 0;
}
.splash-tap {
  margin-top: 40px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--mid-grey);
  animation: splashFade 1.6s ease-in-out infinite;
  animation-delay: 1.2s;
  opacity: 0;
}
@keyframes splashFade {
  0%,100% { opacity: 0.3; }
  50%      { opacity: 1;   }
}
</style>
</head>

            <div style="width:7px;height:7px;background:#3d1f2b;border-radius:50%;position:relative;animation:blink 5s infinite 0.1s;"><span style="position:absolute;width:2px;height:2px;background:white;border-radius:50%;top:1px;left:1px"></span></div>

            <div style="width:8px;height:1.5px;background:#c9b8ba;border-radius:2px;"></div>

          <div style="position:absolute;width:10px;height:9px;background:var(--hot);border-radius:50%;top:50%;right:0;transform:translateY(-50%) rotate(-20deg);box-shadow:0 2px 6px rgba(212,79,120,0.4);"></div>

  <!-- ═══ MOBILE: app wrapper (no-op on desktop via display:contents) ═══ -->
  <div class="app">

    <div class="top-section">

      <!-- Kitty mobile -->

        <button class="btn-pct"   ontouchstart="" onclick="porcentagem()">%</button>
        <button class="btn-op"    ontouchstart="" onclick="add('/')">÷</button>

        <button class="btn-num"   ontouchstart="" onclick="add('7')">7</button>

        <button class="btn-op"    ontouchstart="" onclick="add('*')">×</button>

        <button class="btn-num"   ontouchstart="" onclick="add('4')">4</button>
        <button class="btn-num"   ontouchstart="" onclick="add('5')">5</button>
        <button class="btn-num"   ontouchstart="" onclick="add('6')">6</button>
        <button class="btn-op"    ontouchstart="" onclick="add('-')">−</button>

        <button class="btn-num"   ontouchstart="" onclick="add('2')">2</button>

        <button class="btn-op"    ontouchstart="" onclick="add('+')">+</button>

        <button class="btn-num span2" ontouchstart="" onclick="add('0')">0</button>

<script>
const display = document.getElementById('display');
const history = document.getElementById('history');
const dWrap   = document.getElementById('displayWrap');

let expr     = '';
let justCalc = false;

function updateDisplay(val) {
  display.value = val || '';
  display.placeholder = '0';
}

function add(val) {
  if (justCalc) {
    const ops = ['+','-','*','/'];
    if (!ops.includes(val)) { expr = ''; history.textContent = '\u00a0'; }
    justCalc = false;
  }
  expr += val;
  updateDisplay(formatDisplay(expr));
}

function limpar() {
  expr = ''; justCalc = false;
  updateDisplay('');
  history.textContent = '\u00a0';
}

function apagar() {
  expr = expr.slice(0, -1);
  updateDisplay(formatDisplay(expr));
}

function porcentagem() {
  if (!expr) return;
  try {
    const v = eval(expr) / 100;
    history.textContent = expr + ' %';
    expr = String(v);
    updateDisplay(formatDisplay(expr));
    animatePop();
  } catch(e) { erro(); }
}

function calcular() {
  if (!expr) return;
  try {
    const raw = eval(expr);
    const result = parseFloat(raw.toPrecision(12));
    history.textContent = formatDisplay(expr) + ' =';
    expr = String(result);
    updateDisplay(formatDisplay(expr));
    justCalc = true;
    animatePop();
  } catch(e) { erro(); }
}

function erro() {
  display.value = 'Erro 😿';
  expr = '';
  dWrap.classList.add('shake');
  dWrap.addEventListener('animationend', () => dWrap.classList.remove('shake'), {once:true});
}

function formatDisplay(str) {
  return str.replace(/\*/g,'×').replace(/\//g,'÷');
}

function animatePop() {
  display.classList.add('result-pop');
  display.addEventListener('animationend', () => display.classList.remove('result-pop'), {once:true});
}

// Ripple helper
function spawnRipple(btn, clientX, clientY) {
  const r = document.createElement('span');
  r.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const x = (clientX ?? rect.left + rect.width / 2) - rect.left - size / 2;
  const y = (clientY ?? rect.top  + rect.height / 2) - rect.top  - size / 2;
  r.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
  btn.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}

// ── Touch: fire instantly on touchstart, block the delayed click ──
const grid = document.querySelector('.grid');
const btnActions = {
  'limpar':      () => limpar(),
  'apagar':      () => apagar(),
  'porcentagem': () => porcentagem(),
  'calcular':    () => calcular(),
};

grid.addEventListener('touchstart', function(e) {
  const btn = e.target.closest('button');
  if (!btn) return;
  e.preventDefault(); // block the 300ms ghost click, but we already fired
  const touch = e.touches[0];
  spawnRipple(btn, touch.clientX, touch.clientY);
  // read which function to call from onclick attribute
  const onclickAttr = btn.getAttribute('onclick') || '';
  const match = onclickAttr.match(/^(\w+)\(([^)]*)\)$/);
  if (!match) return;
  const [, fn, arg] = match;
  const val = arg.replace(/['"]/g, '');
  if (fn === 'add') add(val);
  else if (btnActions[fn]) btnActions[fn]();
}, { passive: false });

// Desktop: keep click + ripple working with mouse
grid.addEventListener('click', function(e) {
  if (e.sourceCapabilities && e.sourceCapabilities.firesTouchEvents) return; // skip ghost clicks
  const btn = e.target.closest('button');
  if (!btn) return;
  spawnRipple(btn, e.clientX, e.clientY);
});

// Sound
let audioCtx;
function clickSound(type='click') {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if (type === 'eq') {
      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.06);
    } else if (type === 'clear') {
      osc.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
    } else {
      osc.frequency.setValueAtTime(520, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(560, audioCtx.currentTime + 0.04);
    }
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.15);
    osc.start(); osc.stop(audioCtx.currentTime + 0.15);
  } catch(e) {}
}

// ── Splash screen ──
const splash = document.getElementById('splash');
function dismissSplash() {
  splash.classList.add('hide');
  setTimeout(() => splash.remove(), 700);
}
splash.addEventListener('click', dismissSplash);
splash.addEventListener('touchstart', dismissSplash, { passive: true });
// Auto-dismiss after 4s
setTimeout(dismissSplash, 4000);

// Registra o Service Worker (PWA)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js');
  });
}

// Keyboard (desktop)
document.addEventListener('keydown', function(e) {
  if ('0123456789'.includes(e.key)) add(e.key);
  else if (['+','-'].includes(e.key)) add(e.key);
  else if (e.key === '*') add('*');
  else if (e.key === '/') { e.preventDefault(); add('/'); }
  else if (e.key === '.') add('.');
  else if (e.key === '%') porcentagem();
  else if (e.key === 'Enter' || e.key === '=') { calcular(); clickSound('eq'); }
  else if (e.key === 'Backspace') apagar();
  else if (e.key === 'Escape' || e.key.toLowerCase() === 'c') { limpar(); clickSound('clear'); }
});


</script>
